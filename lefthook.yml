pre-commit:
  parallel: true
  commands:
    format:
      run: npm run format
      glob: '*.{js,ts,svelte,json,css,md,yml,yaml}'

    lint:
      run: npm run lint
      glob: '*.{js,ts,svelte,json,css,md,yml,yaml}'

pre-push:
  commands:
    type-check:
      run: npm run check
      glob: '*.{js,ts,svelte}'

    test:
      run: npm run test
      glob: '*.{js,ts,svelte}'

    cspell:
      run: npx cspell .
      glob: '*.{js,ts,svelte}'
