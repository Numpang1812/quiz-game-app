pre-commit:
  parallel: true
  commands:
    format:
      run: npm run format
      glob: '*.{js,ts,svelte,json,css,md,yml,yaml}'

    lint:
      run: npm run lint
      glob: '*.{js,ts,svelte,json,css,md,yml,yaml}'

pre-push:
  commands:
    type-check:
      run: npm run check
      glob: '*.{js,ts,svelte}'

    test:
      run: npm run test
      glob: '*.{js,ts,svelte}'

    cspell:
      run: npx cspell .
      glob: '*.{js,ts,svelte}'

    check-message:
      run: |
        # Check minimum length
        if [ ${#GIT_PARAMS} -lt 10 ]; then
          echo "Commit message is too short"
          exit 1
        fi

        # Check for banned words
        BANNED_WORDS=("hack" "cheat" "exploit" "something" "anything" "I don't know")
        for word in $BANNED_WORDS; do
          if echo "$GIT_PARAMS" | grep -qi "$word"; then
            echo "Commit message contains banned word: $word"
            exit 1
          fi
        done
