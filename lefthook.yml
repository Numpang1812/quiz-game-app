pre-commit:
  parallel: true
  commands:
    prettier:
      run: pnpm prettier --write {staged_files}
      glob: '*.{js,ts,svelte,json,css,md,yml,yaml}'

    lint:
      run: pnpm lint --fix {staged_files}
      glob: '*.{js,ts,svelte,json,css,md,yml,yaml}'

    audit:
      run: pnpm audit
      fail: error
      message: "Security audit failed. Please run 'pnpm audit' and fix issues."

pre-push:
  parallel: true
  commands:
    type-check:
      run: pnpm check
      glob: '*.{js,ts,svelte}'

    test:
      run: pnpm test
      glob: '*.{js,ts,svelte}'

    cspell:
      run: pnpm cspell .
      glob: '*.{js,ts,svelte}'
